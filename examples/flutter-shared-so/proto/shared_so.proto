syntax = "proto3";

package examples.flutter.sharedso.v1;

option go_package = "example.com/rpccgo-flutter-shared-so/proto;fluttersharedv1";
option java_package = "examples.flutter.sharedso.v1";
option java_multiple_files = true;

// ComposeGreetingRequest carries the caller label and greeting target.
message ComposeGreetingRequest {
  string name = 1;
  string caller = 2;
}

// ComposeGreetingResponse carries the rendered greeting and runtime markers.
message ComposeGreetingResponse {
  string message = 1;
  string served_by = 2;
  string library = 3;
}

// IncrementRuntimeStateRequest changes mutable state inside the Go runtime.
message IncrementRuntimeStateRequest {
  int32 delta = 1;
  string caller = 2;
}

// ReadRuntimeStateRequest identifies the path observing the Go runtime state.
message ReadRuntimeStateRequest {
  string caller = 1;
}

// RuntimeStateResponse identifies one mutable Go runtime state instance.
message RuntimeStateResponse {
  int64 value = 1;
  int64 revision = 2;
  string instance_address = 3;
  string caller = 4;
  int32 pid = 5;
}

// SetTorchRequest asks Android to enable or disable the device torch.
message SetTorchRequest {
  bool enabled = 1;
  string caller = 2;
}

// SetTorchResponse reports the Android torch operation result.
message SetTorchResponse {
  bool enabled = 1;
  string camera_id = 2;
  string caller = 3;
  string status = 4;
}

// AndroidEchoRequest carries hardware-independent Android-owned stream input.
message AndroidEchoRequest {
  int32 value = 1;
  string caller = 2;
}

// AndroidEchoResponse carries Android-owned stream output.
message AndroidEchoResponse {
  int32 value = 1;
  int32 sequence = 2;
  string caller = 3;
  string served_by = 4;
}

// FlutterEchoRequest carries a caller label for the Flutter-owned server.
message FlutterEchoRequest {
  string caller = 1;
}

// FlutterEchoResponse proves that a call reached the Dart message server.
message FlutterEchoResponse {
  string message = 1;
  string caller = 2;
  string served_by = 3;
}

// SharedSoDemo exposes one unary RPC for the shared-library validation example.
// @rpccgo: msg-connect
service SharedSoDemo {
  // ComposeGreeting returns a greeting that identifies the caller path.
  rpc ComposeGreeting(ComposeGreetingRequest) returns (ComposeGreetingResponse);

  // IncrementRuntimeState modifies state through the Flutter FFI path.
  rpc IncrementRuntimeState(IncrementRuntimeStateRequest) returns (RuntimeStateResponse);

  // ReadRuntimeState observes the same state through the Kotlin/JNI path.
  rpc ReadRuntimeState(ReadRuntimeStateRequest) returns (RuntimeStateResponse);

  // WatchRuntimeState streams runtime state snapshots through the Kotlin/JNI path.
  rpc WatchRuntimeState(ReadRuntimeStateRequest) returns (stream RuntimeStateResponse);

  // CollectRuntimeState verifies client streaming through both Flutter FFI and Kotlin/JNI.
  rpc CollectRuntimeState(stream IncrementRuntimeStateRequest) returns (RuntimeStateResponse);

  // StreamRuntimeState verifies server streaming through both Flutter FFI and Kotlin/JNI.
  rpc StreamRuntimeState(ReadRuntimeStateRequest) returns (stream RuntimeStateResponse);

  // ChatRuntimeState verifies bidi streaming through both Flutter FFI and Kotlin/JNI.
  rpc ChatRuntimeState(stream IncrementRuntimeStateRequest) returns (stream RuntimeStateResponse);
}

// AndroidDevice exposes Android-owned capabilities through a Kotlin message server.
// @rpccgo: msg-connect
service AndroidDevice {
  // SetTorch enables or disables the Android camera torch.
  rpc SetTorch(SetTorchRequest) returns (SetTorchResponse);

  // WatchAndroidEcho streams Android-owned echo responses without hardware dependencies.
  rpc WatchAndroidEcho(AndroidEchoRequest) returns (stream AndroidEchoResponse);

  // CollectAndroidEcho collects Android-owned echo requests without hardware dependencies.
  rpc CollectAndroidEcho(stream AndroidEchoRequest) returns (AndroidEchoResponse);

  // ChatAndroidEcho echoes each Android-owned request without hardware dependencies.
  rpc ChatAndroidEcho(stream AndroidEchoRequest) returns (stream AndroidEchoResponse);
}

// FlutterDevice exposes Flutter-owned capabilities through a Dart message server.
// @rpccgo: msg-connect
service FlutterDevice {
  // DescribeFlutter returns a response produced by the registered Dart handler.
  rpc DescribeFlutter(FlutterEchoRequest) returns (FlutterEchoResponse);

  // WatchFlutterEcho streams Flutter-owned echo responses from the Dart handler.
  rpc WatchFlutterEcho(FlutterEchoRequest) returns (stream FlutterEchoResponse);
}
