name: rpccgofluttersharedso
description: Android-only Flutter app proving Kotlin Service and Dart FFI share one Go .so runtime.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  code_assets: ^1.2.1
  ffi: ^2.1.3
  fixnum: ^1.1.1
  flutter:
    sdk: flutter
  hooks: ^2.0.2
  protobuf: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
