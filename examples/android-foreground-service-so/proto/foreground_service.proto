syntax = "proto3";

package examples.android.foregroundservice.v1;

option go_package = "example.com/rpccgo-android-foreground-service-so/proto;foregroundservicev1";
option java_package = "examples.android.foregroundservice.v1";
option java_multiple_files = true;

message ServiceInfoRequest {
  string caller = 1;
}

message ServiceInfoResponse {
  string library = 1;
  int32 pid = 2;
  string instance_address = 3;
}

message WatchTicksRequest {
  string caller = 1;
  int32 interval_millis = 2;
}

message Tick {
  int64 seq = 1;
  int64 unix_millis = 2;
  int32 pid = 3;
  string instance_address = 4;
  string caller = 5;
}

// ForegroundServiceDemo exposes a JNI callback server stream for the Android
// foreground service lifecycle example.
// @rpccgo: msg-connect
service ForegroundServiceDemo {
  rpc ServiceInfo(ServiceInfoRequest) returns (ServiceInfoResponse);
  rpc WatchTicks(WatchTicksRequest) returns (stream Tick);
}
